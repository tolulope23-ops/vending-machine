<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vending Machine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vending-container">

<!-- Title and Navigation Bar -->
       <div id="nav">
            <p id="nav-title">Rae Vending Machine</p>
            <div id="menu">
                <i class="bi bi-list" id="menu-icon"></i>
                <ul id="menu-list" class="hidden">
                <li id="admin-btn">Admin</li>
                <li id="vending-btn">Vending</li>
                </ul>
            </div>
        </div>


<!-- Admin Dashboard if clicked from the menu on the navigation bar -->
        <div id="admin" class="admin-vending">
            <p>ADMIN DASHBOARD</p>
            <div id="stock-inputs">
                <div class="input-group-row">

                <form id="addProductform">

                    <label for="slotCode">SlotCode:</label>
                    <input type="text" id="slotCode" placeholder="e.g. A1">
                    </div>

                    <div class="input-group-row">
                    <label for="p_id">Product ID:</label>
                    <input type="text" id="p_id" placeholder="e.g. COKE-500">
                    </div>

                    <div class="input-group-row">
                    <label for="p_name">Name:</label>
                    <input type="text" id="p_name" placeholder="e.g. Coca-Cola">
                    </div>

                    <div class="input-group-row">
                    <label for="price">Price (₦):</label>
                    <input type="number" id="price" placeholder="e.g. 400" >
                    </div>

                    <div class="input-group-row">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" placeholder="e.g. 5" >
                    </div>

                    <div class="input-group-row">
                    <label for="imageURL">Image URL:</label>
                    <input type="text" id="imageURL" placeholder="Product image">
                    </div>

                    <div class="input-group-row">
                    <label for="category">Category:</label>
                    <input type="text" id="category" placeholder="e.g. Drink">
                    </div>

                    <div class="input-group-row">
                    <label for="size">Size:</label>
                    <input type="text" id="size" placeholder="e.g. 500ml">
                    </div>
                </form>

                <button id="saveToStock">Save</button>
            </div>

        </div>

<!-- Vending Dashboard if clicked from the menu on the navigation bar -->
        <div id="vending" class="admin-vending">
            <p>VENDING MACHING</p>
            <div id="vending-out-div">

                <div id="vending-innerleft-div">
                    <div id="vending-display-grid" class="vending-grid"></div>
                    <div id="dispense-tray">
                        <h6>Dispensed Products</h6>
                        <div id="dispensed-items"></div>
                    </div>
                </div>


                <div id="vending-innerright-div">
                    <div id="vending-display">
                        <p id="display-text"></p>
                    </div>

                    <div id="alpha-num-btn">
                        <button class="btn btn-outline-light alpha">A</button>
                        <button class="btn btn-outline-light alpha">B</button>
                        <button class="btn btn-outline-light alpha">C</button>

                        <button class="btn btn-outline-light">1</button>
                        <button class="btn btn-outline-light">2</button>
                        <button class="btn btn-outline-light">3</button>

                        <button class="btn btn-outline-light">4</button>
                        <button class="btn btn-outline-light">5</button>
                        <button class="btn btn-outline-light">6</button>

                        <button class="btn btn-outline-light">7</button>
                        <button class="btn btn-outline-light">8</button>
                        <button class="btn btn-outline-light">9</button>

                        <button class="btn btn-outline-light">>></button>
                        <button class="btn btn-outline-light">+</button>
                        <button class="btn btn-outline-light">0</button>
                        <button class="btn btn-outline-light">></button>
                    </div>
                    <div id="pay">
                        <div id="insert-money"></div>
                        <button id="check">CheckOut</button>
                    </div>
                </div>

            </div>
        </div>

    </div> 
    <!-- <img src="./images/Coca-cola.png" alt="" srcset=""> -->
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
